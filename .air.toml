root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o ./tmp/main ."
  bin = "./tmp/main"
  include_ext = ["go", "templ", "html"]
  exclude_dir = ["tmp", "assets", "bin"]
  exclude_regex = ["_templ\\.go$"]
  delay = 1000
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
